<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Vasco Fernandes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #fafaf9; color: #1a1a18; min-height: 100vh; display: flex; align-items: center; justify-content: center; -webkit-font-smoothing: antialiased; }
    .container { text-align: center; padding: 32px; }
    .code { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #6b6b67; margin-bottom: 24px; }
    h1 { font-size: 42px; font-weight: 300; letter-spacing: -0.02em; margin-bottom: 12px; }
    p { font-size: 15px; color: #6b6b67; margin-bottom: 32px; }
    a { font-size: 13px; font-weight: 500; color: #1a1a18; text-decoration: none; border: 1px solid #e8e8e5; padding: 8px 20px; border-radius: 4px; transition: border-color 0.15s; }
    a:hover { border-color: #1a1a18; }
  </style>
</head>
<body>
  <div class="container">
    <p class="code">404</p>
    <h1>Page not found.</h1>
    <p>This page doesn't exist or was moved.</p>
    <a href="/">← Back home</a>
  </div>
</body>
</html>
